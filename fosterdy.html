<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fosterdy - 完璧なる規律</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    /* Smart White & Minimalist Theme */
    :root {
        --bg-color: #f2f2f7;
        --card-bg: #ffffff;
        --text-main: #1c1c1e;
        --text-sub: #8e8e93;
        --border-color: #e5e5ea;
        --accent-blue: #007aff;
        --accent-red: #ff3b30;
        
        --color-eng: #ff3b30;
        --color-math: #007aff;
        --color-jp: #34c759;
        --color-sci: #ff9f0a;
        --color-soc: #af52de;
        
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; font-size: 14px; -webkit-font-smoothing: antialiased; }

    header {
        background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
        padding: 14px 20px; border-bottom: 1px solid var(--border-color);
        display: flex; justify-content: space-between; align-items: center;
        position: sticky; top: 0; z-index: 50;
    }
    .header-title { font-weight: 800; font-size: 1.2rem; color: var(--text-main); }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .sub-nav { display: flex; background: #e3e3e8; border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .sub-nav-item { flex: 1; text-align: center; padding: 8px 0; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 6px; }
    .sub-nav-item.active { background-color: var(--card-bg); color: var(--text-main); box-shadow: var(--shadow-sm); }

    .range-selector { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow-sm); margin-bottom: 16px; font-weight: bold; font-size: 0.9rem; }
    .range-arrow { color: var(--accent-blue); cursor: pointer; font-size: 1.1rem; padding: 0 10px; }

    .card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; }
    .card-row { display: flex; align-items: center; gap: 14px; }
    .book-cover { width: 45px; height: 60px; border-radius: 6px; object-fit: cover; background: #f0f0f0; display: flex; justify-content: center; align-items: center; font-size: 0.65rem; color: #aaa; overflow: hidden; border: 1px solid var(--border-color); flex-shrink: 0; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .card-content { flex: 1; display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-weight: 700; font-size: 0.95rem; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-time-display { font-weight: 800; font-size: 1rem; color: var(--text-main); white-space: nowrap; margin-left: 10px; }
    .card-comment { font-size: 0.9rem; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); word-break: break-all;}

    .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
    .badge-eng { background: rgba(255,59,48,0.1); color: var(--color-eng); }
    .badge-math { background: rgba(0,122,255,0.1); color: var(--color-math); }
    .badge-jp { background: rgba(52,199,89,0.1); color: var(--color-jp); }
    .badge-sci { background: rgba(255,159,10,0.1); color: var(--color-sci); }
    .badge-soc { background: rgba(175,82,222,0.1); color: var(--color-soc); }

    .section-title { font-size: 0.95rem; color: var(--text-main); margin-bottom: 12px; font-weight: 800; display: flex; justify-content: space-between; align-items: center;}
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 0.9rem; background: var(--card-bg); border-radius: 12px; }

    input[type="text"], input[type="date"], input[type="number"], select, textarea {
        width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;
        font-size: 0.95rem; background-color: #fafafa; color: var(--text-main); outline: none; resize: none;
    }

    .countdown-box { display: flex; align-items: center; gap: 15px; background: #f0f8ff; padding: 15px; border-radius: 12px; border: 1px solid #cce5ff; }
    .cd-number-box { background: var(--card-bg); padding: 8px 12px; border-radius: 8px; text-align: center; border: 1px solid var(--accent-blue);}
    .cd-number { font-size: 1.6rem; font-weight: 800; color: var(--accent-blue); }
    .cd-label { font-size: 0.65rem; color: var(--text-sub); font-weight: bold;}
    .cd-text { flex: 1; font-weight: 700; font-size: 0.95rem; }

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
    .day-col { text-align: center; }
    .day-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; }
    .day-col input { padding: 8px 2px; text-align: center; font-size: 0.85rem; font-weight: 600;}

    .plan-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 5px; }
    .plan-table th { color: var(--text-sub); font-weight: normal; text-align: left; padding-bottom: 6px; border-bottom: 1px solid var(--border-color); }
    .plan-table td { padding: 8px 0; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
    .plan-table input[type="date"] { padding: 4px; font-size: 0.75rem; width: 105px; border-radius: 4px; border: 1px solid var(--border-color); }
    .plan-table input[type="number"] { padding: 4px; font-size: 0.75rem; width: 45px; text-align: center; border-radius: 4px; border: 1px solid var(--border-color); }

    .btn { padding: 12px; border-radius: 8px; font-weight: 700; text-align: center; cursor: pointer; width: 100%; border: none; font-size: 0.9rem; }
    .btn-primary { background: var(--accent-blue); color: #fff; }
    .btn-outline { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--accent-blue); }

    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 55px;
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color);
        display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item { color: var(--text-sub); font-size: 0.7rem; font-weight: 700; text-align: center; cursor: pointer; flex: 1; padding: 8px 0; }
    .nav-item.active { color: var(--accent-blue); }

    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: flex-end; z-index: 1000;
    }
    .modal-content { width: 100%; max-width: 500px; padding: 24px; border-radius: 20px 20px 0 0; background: var(--card-bg); max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>

<header>
    <div class="header-title">fosterdy</div>
    <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-sub);">FOS-8829</div>
</header>

<div id="view-timeline" class="tab-content active">
    <div class="sub-nav">
        <div class="sub-nav-item active">自分</div>
        <div class="sub-nav-item">友達</div>
    </div>
    <div id="timeline-list">
        <div class="empty-state" id="timeline-empty">学習記録が存在しません。</div>
    </div>
</div>

<div id="view-record" class="tab-content">
    <button class="btn btn-outline" style="margin-bottom: 16px;" onclick="openModal('add-book-modal')">＋ 教材を登録</button>
    <div id="book-list">
        <div class="empty-state" id="record-empty">登録された教材がありません。</div>
    </div>
</div>

<div id="view-report" class="tab-content">
    <div class="sub-nav">
        <div class="sub-nav-item active" onclick="switchReportTab('day', this)">日</div>
        <div class="sub-nav-item" onclick="switchReportTab('week', this)">週</div>
        <div class="sub-nav-item" onclick="switchReportTab('month', this)">月</div>
    </div>
    
    <div class="range-selector">
        <span class="range-arrow">＜</span>
        <span id="range-text">2026年06月16日</span>
        <span class="range-arrow">＞</span>
    </div>

    <div class="card" id="chart-card" style="padding: 12px;">
        <div style="height: 140px; position: relative;">
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="card" id="daily-target-card">
        <div class="section-title">
            <span>今日の目標時間設定 (時間)</span>
            <span style="color: var(--accent-blue); font-size: 0.9rem;" id="daily-percent">達成率: 0%</span>
        </div>
        <div class="input-group" style="margin-bottom: 0;">
            <input type="number" id="t-day" placeholder="例: 5" onchange="calcDailyProgress()">
        </div>
    </div>

    <div class="card" id="weekly-target-card" style="display: none;">
        <div class="section-title">
            <span>今週の目標時間設定 (時間)</span>
            <span style="color: var(--accent-blue); font-size: 0.9rem;" id="weekly-percent">達成率: 0%</span>
        </div>
        <div class="week-grid">
            <div class="day-col"><div class="day-label">月</div><input type="number" id="t-mon" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label">火</div><input type="number" id="t-tue" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label">水</div><input type="number" id="t-wed" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label">木</div><input type="number" id="t-thu" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label">金</div><input type="number" id="t-fri" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label" style="color:var(--accent-blue);">土</div><input type="number" id="t-sat" placeholder="0" onchange="calcWeeklyTarget()"></div>
            <div class="day-col"><div class="day-label" style="color:var(--accent-red);">日</div><input type="number" id="t-sun" placeholder="0" onchange="calcWeeklyTarget()"></div>
        </div>
    </div>

    <div class="section-title" id="list-title">本日の教材</div>
    <div id="report-dynamic-list"></div>
</div>

<div id="view-mypage" class="tab-content">
    <div class="card">
        <div class="section-title">志望校設定</div>
        <input type="text" id="target-school" placeholder="例: 関西大学" style="font-weight: bold; font-size: 1.05rem; margin-bottom: 12px;">
        
        <div class="countdown-box">
            <div class="cd-number-box">
                <div class="cd-label">残り</div>
                <div class="cd-number" id="cd-days">--</div>
                <div class="cd-label">日</div>
            </div>
            <div class="cd-text">
                <div style="margin-bottom: 4px; font-size: 0.8rem; color: var(--text-sub);">試験日（Xデー）</div>
                <input type="date" id="target-date" onchange="calcCountdown()" style="padding: 4px; font-size: 0.85rem; border: none; background: transparent; border-bottom: 1px solid var(--accent-blue); border-radius: 0;">
            </div>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <div class="section-title">
            <span>到達度テスト 年間計画表</span>
            <span style="color: var(--accent-red); font-size: 0.85rem;" id="avg-score-display">平均: --%</span>
        </div>
        <table class="plan-table">
            <tr><th>レベル</th><th>受ける目標日</th><th>実際に受けた日</th><th>スコア</th></tr>
            <tr><td>日東駒専</td><td><input type="date"></td><td><input type="date"></td><td><input type="number" class="test-score" placeholder="%" min="0" max="100" oninput="calcAverageScore()"></td></tr>
            <tr><td>MARCH</td><td><input type="date"></td><td><input type="date"></td><td><input type="number" class="test-score" placeholder="%" min="0" max="100" oninput="calcAverageScore()"></td></tr>
            <tr><td>地方国公立</td><td><input type="date"></td><td><input type="date"></td><td><input type="number" class="test-score" placeholder="%" min="0" max="100" oninput="calcAverageScore()"></td></tr>
            <tr><td>早慶</td><td><input type="date"></td><td><input type="date"></td><td><input type="number" class="test-score" placeholder="%" min="0" max="100" oninput="calcAverageScore()"></td></tr>
            <tr><td>旧帝</td><td><input type="date"></td><td><input type="date"></td><td><input type="number" class="test-score" placeholder="%" min="0" max="100" oninput="calcAverageScore()"></td></tr>
        </table>
    </div>
</div>

<div id="add-book-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom: 16px; font-size: 1.05rem; font-weight: 800;">教材登録</h3>
        <div class="input-group"><span class="input-label">教材名</span><input type="text" id="new-book-title" placeholder="例: 数学Ⅰ・A 基礎問題精講"></div>
        <div class="input-group">
            <span class="input-label">科目</span>
            <select id="new-book-subject">
                <option value="eng">英語</option><option value="math">数学</option><option value="jp">国語</option><option value="sci">理科</option><option value="soc">社会</option>
            </select>
        </div>
        <div class="input-group"><span class="input-label">表紙画像 (任意)</span><input type="file" id="new-book-image" accept="image/*" onchange="previewImage(this)"></div>
        <button class="btn btn-primary" onclick="registerBook()">登録する</button>
        <button class="btn btn-outline" style="margin-top: 10px; border:none;" onclick="closeModal('add-book-modal')">キャンセル</button>
    </div>
</div>

<div id="record-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="record-book-title" style="margin-bottom: 16px; font-size: 1.05rem; font-weight: 800;"></h3>
        <div class="input-group"><span class="input-label">学習時間 (分)</span><input type="number" id="record-time" placeholder="例: 90"></div>
        <div class="input-group"><span class="input-label">コメント (任意)</span><textarea id="record-comment" rows="3" placeholder="空欄可"></textarea></div>
        <input type="hidden" id="record-book-id"><button class="btn btn-primary" onclick="submitRecord()">記録する</button>
        <button class="btn btn-outline" style="margin-top: 10px; border:none;" onclick="closeModal('record-modal')">キャンセル</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('view-timeline', this)">タイムライン</div>
    <div class="nav-item" onclick="switchTab('view-record', this)">記録する</div>
    <div class="nav-item" onclick="switchTab('view-report', this)">レポート</div>
    <div class="nav-item" onclick="switchTab('view-mypage', this)">マイページ</div>
</div>

<script>
    let registeredBooks = [];
    let studyRecords = [];
    let currentReportTab = 'day';
    let chartInstance = null;

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
        if(tabId === 'view-report') updateReportView();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // --- レポート：日・週・月の完全連動 ---
    function switchReportTab(period, element) {
        currentReportTab = period;
        document.querySelectorAll('.sub-nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        updateReportView();
    }

    function updateReportView() {
        const rangeText = document.getElementById('range-text');
        const listTitle = document.getElementById('list-title');
        const weeklyCard = document.getElementById('weekly-target-card');
        const dailyCard = document.getElementById('daily-target-card');
        
        // 初期値の「荒い数字」を完全に排除し、実数のみを集計
        if (currentReportTab === 'day') {
            rangeText.innerText = "2026年06月16日";
            listTitle.innerText = "本日の教材";
            weeklyCard.style.display = 'none';
            dailyCard.style.display = 'block'; // 1日の目標達成度エリアを出現
            renderDynamicChart(['今日'], [getTotalTime('day')], 'h');
            calcDailyProgress();
        } else if (currentReportTab === 'week') {
            rangeText.innerText = "2026年05月04日〜2026年06月21日";
            listTitle.innerText = "今週の教材";
            weeklyCard.style.display = 'block';
            dailyCard.style.display = 'none';
            renderDynamicChart(['5/4', '5/11', '5/18', '5/25', '6/1', '6/8', '6/15'], [getTotalTime('week'), 0, 0, 0, 0, 0, 0], 'h');
            calcWeeklyTarget();
        } else if (currentReportTab === 'month') {
            rangeText.innerText = "2025年12月01日〜2026年06月30日";
            listTitle.innerText = "今期間の教材";
            weeklyCard.style.display = 'none';
            dailyCard.style.display = 'none';
            renderDynamicChart(['12月', '1月', '2月', '3月', '4月', '5月', '6月'], [0, 0, 0, 0, 0, 0, getTotalTime('month')], 'h');
        }
        renderDynamicList();
    }

    function getTotalTime(period) {
        let totalMinutes = 0;
        studyRecords.forEach(r => totalMinutes += r.time);
        return totalMinutes > 0 ? (totalMinutes / 60).toFixed(1) : 0;
    }

    function renderDynamicChart(labels, data, unit) {
        const ctx = document.getElementById('barChart');
        if (chartInstance) { chartInstance.destroy(); }
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ data: data, backgroundColor: '#ff3b30', borderRadius: 3, barPercentage: 0.4 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#f2f2f7' }, ticks: { color: '#8e8e93', font: {size: 10}, callback: function(v){return v + unit;} } },
                    x: { grid: { display: false }, ticks: { color: '#8e8e93', font: {size: 11, weight: 'bold'} } }
                }
            }
        });
    }

    function renderDynamicList() {
        const container = document.getElementById('report-dynamic-list');
        container.innerHTML = '';
        if (registeredBooks.length === 0) {
            container.innerHTML = `<div class="empty-state" style="box-shadow:none;">この期間の学習データがありません。</div>`;
            return;
        }
        registeredBooks.forEach(book => {
            let bookTotalMinutes = 0;
            studyRecords.forEach(record => {
                if (record.bookId === book.id) { bookTotalMinutes += record.time; }
            });
            const displayTime = bookTotalMinutes > 0 ? `${bookTotalMinutes}分` : `0分`;
            const imgHTML = book.img ? `<img src="${book.img}">` : `<span>No Img</span>`;
            const itemHTML = `<div class="card" style="margin-bottom:8px;"><div class="card-row"><div class="book-cover">${imgHTML}</div><div class="card-content"><div class="card-title">${book.title}</div><div class="card-time-display">${displayTime}</div></div></div></div>`;
            container.insertAdjacentHTML('beforeend', itemHTML);
        });
    }

    // --- 教材マニュアル登録 ---
    let currentImageSrc = "";
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { currentImageSrc = e.target.result; }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function registerBook() {
        const title = document.getElementById('new-book-title').value.trim();
        const subjectVal = document.getElementById('new-book-subject').value;
        if(!title) { alert("教材名を入力してください。"); return; }

        const bookId = 'book_' + Date.now();
        registeredBooks.push({ id: bookId, title: title, subject: subjectVal, img: currentImageSrc });

        let badgeClass = "badge-eng"; let badgeText = "英語";
        if(subjectVal === "math") { badgeClass = "badge-math"; badgeText = "数学"; }
        else if(subjectVal === "jp") { badgeClass = "badge-jp"; badgeText = "国語"; }
        else if(subjectVal === "sci") { badgeClass = "badge-sci"; badgeText = "理科"; }
        else if(subjectVal === "soc") { badgeClass = "badge-soc"; badgeText = "社会"; }

        const imgHTML = currentImageSrc ? `<img src="${currentImageSrc}">` : `<span>No Img</span>`;
        const cardHTML = `<div class="card" onclick="openRecordModal('${bookId}', '${title}')" style="cursor: pointer;"><div class="card-row"><div class="book-cover">${imgHTML}</div><div class="card-content"><div class="card-title">${title}</div><div class="card-meta"><span class="badge ${badgeClass}">${badgeText}</span>タップして記録</div></div></div></div>`;
        document.getElementById('record-empty').style.display = 'none';
        document.getElementById('book-list').insertAdjacentHTML('beforeend', cardHTML);

        document.getElementById('new-book-title').value = ''; currentImageSrc = "";
        closeModal('add-book-modal');
    }

    // --- 記録処理 ---
    function openRecordModal(id, title) {
        document.getElementById('record-book-title').innerText = title;
        document.getElementById('record-book-id').value = id;
        document.getElementById('record-time').value = '';
        document.getElementById('record-comment').value = '';
        openModal('record-modal');
    }

    function submitRecord() {
        const bookId = document.getElementById('record-book-id').value;
        const timeVal = parseInt(document.getElementById('record-time').value);
        const comment = document.getElementById('record-comment').value.trim();
        if(isNaN(timeVal) || timeVal <= 0) { alert("時間を正しく入力してください。"); return; }

        const book = registeredBooks.find(b => b.id === bookId);
        studyRecords.push({ bookId: bookId, time: timeVal, comment: comment, timestamp: Date.now() });

        const imgHTML = book.img ? `<img src="${book.img}">` : `<span>No Img</span>`;
        const commentHTML = comment ? `<div class="card-comment">${comment}</div>` : '';
        let badgeClass = "badge-eng"; let badgeText = "英語";
        if(book.subject === "math") { badgeClass = "badge-math"; badgeText = "数学"; }
        else if(book.subject === "jp") { badgeClass = "badge-jp"; badgeText = "国語"; }
        else if(book.subject === "sci") { badgeClass = "badge-sci"; badgeText = "理科"; }
        else if(book.subject === "soc") { badgeClass = "badge-soc"; badgeText = "社会"; }

        const tlHTML = `<div class="card"><div class="card-row"><div class="book-cover">${imgHTML}</div><div class="card-content"><div class="card-title">${book.title}</div><div class="card-meta"><span class="badge ${badgeClass}">${badgeText}</span> <strong>${timeVal}分</strong></div></div></div>${commentHTML}</div>`;
        document.getElementById('timeline-empty').style.display = 'none';
        document.getElementById('timeline-list').insertAdjacentHTML('afterbegin', tlHTML);

        let totalDayMinutes = 0;
        studyRecords.forEach(r => totalDayMinutes += r.time);
        document.getElementById('total-day-time').innerText = totalDayMinutes;

        if(currentReportTab === 'day') { calcDailyProgress(); } else if(currentReportTab === 'week') { calcWeeklyTarget(); }

        closeModal('record-modal');
        switchTab('view-timeline', document.querySelectorAll('.nav-item')[0]);
    }

    // --- 1日の目標達成率計算 ---
    function calcDailyProgress() {
        const targetHours = parseFloat(document.getElementById('t-day').value);
        const display = document.getElementById('daily-percent');
        let totalMinutes = 0;
        studyRecords.forEach(r => totalMinutes += r.time);
        
        if (targetHours > 0) {
            const currentHours = totalMinutes / 60;
            const percent = Math.floor((currentHours / targetHours) * 100);
            display.innerText = `達成率: ${percent}%`;
        } else {
            display.innerText = `達成率: 0%`;
        }
    }

    // --- 週間の目標達成率計算 ---
    function calcWeeklyTarget() {
        const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        let totalTargetHours = 0;
        days.forEach(day => {
            const val = parseFloat(document.getElementById(`t-${day}`).value);
            if(!isNaN(val)) totalTargetHours += val;
        });
        let totalMinutes = 0;
        studyRecords.forEach(r => totalMinutes += r.time);
        let percent = 0;
        if(totalTargetHours > 0) { percent = Math.floor(((totalMinutes / 60) / totalTargetHours) * 100); }
        document.getElementById('weekly-percent').innerText = `達成率: ${percent}%`;
    }

    // --- マイページ計算 ---
    function calcCountdown() {
        const targetStr = document.getElementById('target-date').value;
        const display = document.getElementById('cd-days');
        if(!targetStr) { display.innerText = '--'; return; }
        const today = new Date(); today.setHours(0,0,0,0);
        const target = new Date(targetStr); target.setHours(0,0,0,0);
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        display.innerText = diffDays < 0 ? '0' : diffDays;
    }

    function calcAverageScore() {
        const scoreInputs = document.querySelectorAll('.test-score');
        let total = 0; let count = 0;
        scoreInputs.forEach(input => {
            const val = parseFloat(input.value);
            if(!isNaN(val)) { total += val; count++; }
        });
        const display = document.getElementById('avg-score-display');
        display.innerText = count > 0 ? `平均: ${Math.floor(total / count)}%` : `平均: --%`;
    }

    window.onload = () => {
        const d = new Date(); d.setDate(d.getDate() + 240);
        document.getElementById('target-date').value = d.toISOString().split('T')[0];
        calcCountdown();
    };
</script>
</body>
</html>
