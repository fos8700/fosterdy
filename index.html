<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fosterdy - 完璧なる規律</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --bg-color: #f2f2f7;
        --card-bg: #ffffff;
        --text-main: #1c1c1e;
        --text-sub: #8e8e93;
        --border-color: #e5e5ea;
        --accent-blue: #007aff;
        --accent-red: #ff3b30;
        --accent-green: #34c759;
        --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 80px; font-size: 14px; -webkit-font-smoothing: antialiased; }

    header {
        background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
        padding: 14px 20px; border-bottom: 1px solid var(--border-color);
        display: flex; justify-content: space-between; align-items: center;
        position: sticky; top: 0; z-index: 50;
    }
    .header-title { font-weight: 800; font-size: 1.2rem; color: var(--text-main); }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    .sub-nav { display: flex; background: #e3e3e8; border-radius: 8px; padding: 3px; margin-bottom: 16px; }
    .sub-nav-item { flex: 1; text-align: center; padding: 8px 0; color: var(--text-sub); font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 6px; }
    .sub-nav-item.active { background-color: var(--card-bg); color: var(--text-main); box-shadow: var(--shadow-sm); }

    .range-selector { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow-sm); margin-bottom: 16px; font-weight: bold; font-size: 0.9rem; }
    .range-arrow { color: var(--accent-blue); cursor: pointer; font-size: 1.1rem; padding: 0 10px; }

    .card { background-color: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; }
    .card-row { display: flex; align-items: center; gap: 14px; }
    .book-cover { width: 45px; height: 60px; border-radius: 6px; object-fit: cover; background: #f0f0f0; display: flex; justify-content: center; align-items: center; font-size: 0.65rem; color: #aaa; overflow: hidden; border: 1px solid var(--border-color); flex-shrink: 0; }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .card-content { flex: 1; display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-weight: 700; font-size: 0.95rem; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-comment { font-size: 0.9rem; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); word-break: break-all;}

    .section-title { font-size: 0.95rem; color: var(--text-main); margin-bottom: 12px; font-weight: 800; display: flex; justify-content: space-between; align-items: center;}
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 0.9rem; background: var(--card-bg); border-radius: 12px; }

    .input-group { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .input-label { font-size: 0.8rem; font-weight: 700; color: var(--text-sub); }

    input[type="text"], input[type="date"], input[type="number"], select, textarea {
        width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;
        font-size: 0.95rem; background-color: #fafafa; color: var(--text-main); outline: none; resize: none;
    }

    #qr-reader-container { display: none; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 12px; position: relative; }
    #reader { width: 100% !important; border: none !important; }

    .growth-plan-box { background: #fefff0; border: 1px solid #e1db9c; padding: 14px; border-radius: 12px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 8px;}
    .growth-header { display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.9rem; color: #857200; }
    .growth-main { display: flex; align-items: baseline; gap: 10px; margin: 4px 0; }
    .growth-hours { font-size: 1.8rem; font-weight: 900; color: #1c1c1e; }
    .growth-diff { font-size: 0.9rem; font-weight: 800; color: var(--accent-green); }
    .growth-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; font-size: 0.75rem; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 6px; color: #555; }
    .growth-grid-item { font-weight: 600; }

    .countdown-box { display: flex; align-items: center; gap: 15px; background: #f0f8ff; padding: 15px; border-radius: 12px; border: 1px solid #cce5ff; }
    .cd-number-box { background: var(--card-bg); padding: 8px 12px; border-radius: 8px; text-align: center; border: 1px solid var(--accent-blue);}
    .cd-number { font-size: 1.6rem; font-weight: 800; color: var(--accent-blue); }
    .cd-label { font-size: 0.65rem; color: var(--text-sub); font-weight: bold;}

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
    .day-col { text-align: center; }
    .day-label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 4px; }
    .day-col input { padding: 8px 2px; text-align: center; font-size: 0.85rem; font-weight: 600;}

    .plan-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 5px; }
    .plan-table th { color: var(--text-sub); font-weight: normal; text-align: left; padding-bottom: 6px; border-bottom: 1px solid var(--border-color); }
    .plan-table td { padding: 8px 0; border-bottom: 1px solid var(--border-color); vertical-align: middle; }

    .btn { padding: 12px; border-radius: 8px; font-weight: 700; text-align: center; cursor: pointer; width: 100%; border: none; font-size: 0.9rem; }
    .btn-primary { background: var(--accent-blue); color: #fff; }
    .btn-danger { background: var(--accent-red); color: #fff; }
    .btn-outline { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--accent-blue); }

    .bottom-nav {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 55px;
        background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color);
        display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item { color: var(--text-sub); font-size: 0.7rem; font-weight: 700; text-align: center; cursor: pointer; flex: 1; padding: 8px 0; }
    .nav-item.active { color: var(--accent-blue); }

    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: flex-end; z-index: 1000;
    }
    .modal-content { width: 100%; max-width: 500px; padding: 24px; border-radius: 20px 20px 0 0; background: var(--card-bg); max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>

<header>
    <div class="header-title">fosterdy</div>
    <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-sub);">V3.51 FIXED</div>
</header>

<div id="view-timeline" class="tab-content active">
    <div class="sub-nav">
        <div class="sub-nav-item active" onclick="switchTimelineTab('me', this)">自分</div>
        <div class="sub-nav-item" onclick="switchTimelineTab('friends', this)">友達</div>
    </div>
    <div id="timeline-list"><div class="empty-state">データ読み込み中...</div></div>
</div>

<div id="view-record" class="tab-content">
    <button class="btn btn-outline" style="margin-bottom: 16px;" onclick="openModal('add-book-modal')">＋ 教材を登録</button>
    <div id="book-list"><div class="empty-state">登録された教材がありません。</div></div>
</div>

<div id="view-report" class="tab-content">
    <div class="sub-nav">
        <div class="sub-nav-item active" onclick="switchReportTab('day', this)">日</div>
        <div class="sub-nav-item" onclick="switchReportTab('week', this)">週</div>
        <div class="sub-nav-item" onclick="switchReportTab('month', this)">月</div>
    </div>
    <div class="range-selector"><span class="range-arrow">＜</span><span id="range-text">--</span><span class="range-arrow">＞</span></div>

    <div class="growth-plan-box">
        <div class="growth-header"><span>来週推奨：成長プラン</span><span style="font-size: 0.7rem;">前進性過負荷10%</span></div>
        <div class="growth-main"><span class="growth-hours" id="growth-target-hours">0.0 時間</span><span class="growth-diff" id="growth-target-diff">( +0.0h / +10% )</span></div>
        <div class="growth-grid" id="growth-day-grid"></div>
    </div>

    <div class="card" style="padding: 12px;"><div style="height: 140px; position: relative;"><canvas id="barChart"></canvas></div></div>
    <div class="card" id="daily-target-card">
        <div class="section-title"><span>今日の目標時間設定</span><span style="color: var(--accent-blue);" id="daily-percent">達成率: 0%</span></div>
        <input type="number" id="t-day" placeholder="例: 5" onchange="saveDailyTargetInput()">
    </div>
    <div class="card" id="weekly-target-card" style="display: none;">
        <div class="section-title"><span>今週の目標時間設定</span><span style="color: var(--accent-blue);" id="weekly-percent">達成率: 0%</span></div>
        <div class="week-grid">
            <div class="day-col"><div class="day-label">月</div><input type="number" id="t-mon" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label">火</div><input type="number" id="t-tue" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label">水</div><input type="number" id="t-wed" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label">木</div><input type="number" id="t-thu" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label">金</div><input type="number" id="t-fri" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label" style="color:var(--accent-blue);">土</div><input type="number" id="t-sat" onchange="saveWeeklyTargetInputs()"></div>
            <div class="day-col"><div class="day-label" style="color:var(--accent-red);">日</div><input type="number" id="t-sun" onchange="saveWeeklyTargetInputs()"></div>
        </div>
    </div>
</div>

<div id="view-mypage" class="tab-content">
    <div class="card" style="background: #f9f9fc; border: 1px dashed var(--accent-blue);">
        <div class="section-title" style="color: var(--accent-blue);">👤 あなたの同期ID</div>
        <input type="text" id="my-cloud-id" readonly style="font-weight: bold; text-align: center;" onclick="this.select();">
        <div class="section-title" style="margin-top: 12px;">🔗 友達のIDを登録</div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="friend-id-input" placeholder="友達のIDをペースト">
            <button class="btn btn-primary" style="width: auto; padding: 0 16px;" onclick="addFriend()">接続</button>
        </div>
        <div id="friends-list-display" style="font-size: 0.75rem; color: var(--text-sub); margin-top: 4px;"></div>
    </div>

    <div class="card">
        <div class="section-title">志望校設定</div>
        <input type="text" id="target-school" list="university-list" placeholder="大学名を入力しろ（例: 京都大学）" style="font-weight: bold;" oninput="generateDynamicMilestones()">
        
        <div class="countdown-box">
            <div class="cd-number-box"><div class="cd-label">残り</div><div class="cd-number" id="cd-days">--</div><div class="cd-label">日</div></div>
            <div class="cd-text"><div style="margin-bottom: 4px; font-size: 0.8rem; color: var(--text-sub);">試験日</div><input type="date" id="target-date" onchange="saveMyPageInputs()"></div>
        </div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <div class="section-title"><span>到達度テスト 年間計画表</span><span style="color: var(--accent-red);" id="avg-score-display">平均: --%</span></div>
        <table class="plan-table">
            <thead><tr><th>レベル</th><th>受ける目標日</th><th>実際に受けた日</th><th>スコア</th></tr></thead>
            <tbody id="milestone-rows-container"></tbody>
        </table>
    </div>
</div>

<datalist id="university-list">
    <option value="東京大学"><option value="京都大学"><option value="大阪大学"><option value="神戸大学"><option value="東北大学"><option value="九州大学"><option value="北海道大学"><option value="名古屋大学"><option value="一橋大学"><option value="東京工業大学"><option value="筑波大学"><option value="千葉大学"><option value="広島大学"><option value="岡山大学"><option value="金沢大学"><option value="新潟大学"><option value="早稲田大学"><option value="慶應義塾大学"><option value="上智大学"><option value="東京理科大学"><option value="明治大学"><option value="青山学院大学"><option value="立教大学"><option value="中央大学"><option value="法政大学"><option value="関西大学"><option value="関西学院大学"><option value="同志社大学"><option value="立命館大学"><option value="京都産業大学"><option value="近畿大学"><option value="甲南大学"><option value="龍谷大学"><option value="日本大学"><option value="東洋大学"><option value="駒澤大学"><option value="専修大学">
</datalist>

<div id="add-book-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="font-size: 1.05rem; font-weight: 800;">教材登録</h3>
        
        <button class="btn btn-outline" id="scan-btn" onclick="toggleScanner()">📷 バーコードをスキャンする</button>
        <div id="qr-reader-container"><div id="reader"></div></div>

        <div class="input-group"><span class="input-label">教材名</span><input type="text" id="new-book-title" placeholder="教材名（自動入力可）"></div>
        <div class="input-group"><span class="input-label">総ページ数</span><input type="number" id="new-book-pages" placeholder="例: 300"></div>
        <button class="btn btn-primary" onclick="registerBook()">登録する</button>
        <button class="btn btn-outline" style="border:none;" onclick="closeModalAndStopScanner()">キャンセル</button>
    </div>
</div>

<div id="record-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="record-book-title" style="font-size: 1.05rem; font-weight: 800;"></h3>
        <div class="input-group"><span class="input-label">学習時間 (分)</span><input type="number" id="record-time" placeholder="例: 90"></div>
        <div class="input-group"><span class="input-label">コメント</span><textarea id="record-comment" rows="3" placeholder="空欄可"></textarea></div>
        <input type="hidden" id="record-book-id">
        <button class="btn btn-primary" onclick="submitRecord()">記録する</button>
        <button class="btn btn-danger" style="margin-top: 4px;" onclick="deleteBook()">この教材を削除</button>
        <button class="btn btn-outline" style="border:none;" onclick="closeModal('record-modal')">キャンセル</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('view-timeline', this)">タイムライン</div>
    <div class="nav-item" onclick="switchTab('view-record', this)">記録する</div>
    <div class="nav-item" onclick="switchTab('view-report', this)">レポート</div>
    <div class="nav-item" onclick="switchTab('view-mypage', this)">マイページ</div>
</div>

<script>
    // 🔥 マスターキー固定
    const firebaseConfig = {
        apiKey: "AIzaSyDOA8ZUxyyITCm2tCZgS87LozvVehAY0ks",
        authDomain: "fosterdy.firebaseapp.com",
        projectId: "fosterdy",
        storageBucket: "fosterdy.firebasestorage.app",
        messagingSenderId: "436303610845",
        appId: "1:436303610845:web:d9a60bc816c3b2d6d12c34",
        measurementId: "G-T44Z1PWN5P"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const DEFAULT_USER_DATA = {
        version: "3.51", cloudId: "", friends: [], books: [], records: [],
        targets: { day: "", week: { mon: "", tue: "", wed: "", thu: "", fri: "", sat: "", sun: "" } },
        mypage: { school: "", date: "", savedScores: {} }
    };

    let userData = {}; let chartInstance = null; let currentImageSrc = ""; let currentReportTab = 'day'; let currentTimelineTab = 'me'; let html5QrcodeScanner = null;

    function initializeStorage() {
        const localRaw = localStorage.getItem('fosterdy_userdata');
        if (!localRaw) {
            userData = JSON.parse(JSON.stringify(DEFAULT_USER_DATA));
            userData.cloudId = 'FOS-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        } else {
            userData = mergeObjects(DEFAULT_USER_DATA, JSON.parse(localRaw));
            if(!userData.cloudId) userData.cloudId = 'FOS-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }
        saveToLocalStorage();
        document.getElementById('my-cloud-id').value = userData.cloudId;
        renderAllViews(); syncWithCloud();
    }

    function mergeObjects(target, source) {
        let out = Array.isArray(source) ? [] : {};
        for (let key in source) { if (source[key] !== null && typeof source[key] === 'object') { out[key] = mergeObjects(target[key] || {}, source[key]); } else { out[key] = source[key]; } }
        for (let key in target) { if (out[key] === undefined) { out[key] = target[key]; } }
        return out;
    }

    function saveToLocalStorage() { localStorage.setItem('fosterdy_userdata', JSON.stringify(userData)); }
    function syncWithCloud() {
        db.collection("users").doc(userData.cloudId).set({ cloudId: userData.cloudId, books: userData.books, records: userData.records, lastUpdated: Date.now() });
    }

    // 🔥 友達接続の防衛安全配管（バグ完全駆逐）
    function addFriend() {
        const fId = document.getElementById('friend-id-input').value.trim().toUpperCase();
        if(!fId) return;
        if(fId === userData.cloudId) { alert("自分のIDは登録できない。"); return; }
        if(userData.friends.includes(fId)) { alert("既に登録済みの戦友だ。"); return; }
        
        db.collection("users").doc(fId).get().then(doc => {
            if (doc.exists) {
                userData.friends.push(fId);
                saveToLocalStorage();
                document.getElementById('friend-id-input').value = '';
                displayFriendsList();
                alert("友達の配管と接続完了。");
                renderTimelineList();
            } else {
                if (fId.startsWith("FOS-") && fId.length >= 8) {
                    userData.friends.push(fId);
                    saveToLocalStorage();
                    document.getElementById('friend-id-input').value = '';
                    displayFriendsList();
                    alert("友達はまだ空っぽだが、先行接続に成功。");
                    renderTimelineList();
                } else { alert("IDの形式が正しくない。"); }
            }
        }).catch(err => {
            if (fId.startsWith("FOS-")) {
                userData.friends.push(fId);
                saveToLocalStorage();
                document.getElementById('friend-id-input').value = '';
                displayFriendsList();
                alert("強制承認ルートで接続を確立した。");
                renderTimelineList();
            }
        });
    }

    // 🔥 バーコード制御
    function toggleScanner() {
        const container = document.getElementById('qr-reader-container');
        if (container.style.display === 'block') { stopScanner(); return; }
        container.style.display = 'block';
        document.getElementById('scan-btn').innerText = "⏹️ スキャナを停止";
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 120 } },
            (decodedText) => {
                if (decodedText.startsWith("978") || decodedText.startsWith("979")) {
                    stopScanner();
                    document.getElementById('new-book-title').value = "書籍情報を照会中...";
                    fetch(`https://api.openbd.jp/v1/get?isbn=${decodedText}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data && data.summary) {
                            document.getElementById('new-book-title').value = data.summary.title;
                            currentImageSrc = data.summary.cover || "";
                        } else { document.getElementById('new-book-title').value = "見つかりませんでした。手動入力しろ。"; }
                    }).catch(() => { document.getElementById('new-book-title').value = "手動入力しろ。"; });
                }
            },
            () => {}
        ).catch(() => { stopScanner(); alert("カメラ権限を許可しろ。"); });
    }

    function stopScanner() {
        document.getElementById('qr-reader-container').style.display = 'none';
        document.getElementById('scan-btn').innerText = "📷 バーコードをスキャンする";
        if (html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }).catch(err => console.error(err)); }
    }
    function closeModalAndStopScanner() { stopScanner(); closeModal('add-book-modal'); }

    // --- ルート逆算 ---
    function generateDynamicMilestones() {
        const schoolInput = document.getElementById('target-school').value.trim();
        const targetDateStr = document.getElementById('target-date').value;
        const container = document.getElementById('milestone-rows-container');
        userData.mypage.school = schoolInput; saveToLocalStorage();
        if (!targetDateStr) return;

        const today = new Date(); today.setHours(0,0,0,0); const examDate = new Date(targetDateStr); examDate.setHours(0,0,0,0);
        const totalDiffTime = examDate - today;
        function getStepDateStr(fraction) { return totalDiffTime <= 0 ? targetDateStr : new Date(today.getTime() + (totalDiffTime * fraction)).toISOString().split('T'); }

        const isNational = /国公立|東京大学|京都大学|大阪大学|神戸大学|東北大学|九州大学|北海道大学|名古屋大学|一橋大学|東京工業大学|筑波大学|千葉大学|広島大学|岡山大学/.test(schoolInput);
        const isTopTier = /東京大学|京都大学|大阪大学|神戸大学|早稲田大学|慶應義塾大学|上智大学/.test(schoolInput);
        const isMidTier = /青山学院大学|明治大学|法政大学|中央大学|立教大学|関西大学|同志社大学|立命館大学/.test(schoolInput);

        let routes = [];
        if (isNational) {
            routes.push({ id: "日大・共通テスト基礎", label: "日大・共通テスト基礎", date: getStepDateStr(0.35) });
            if (isTopTier) {
                routes.push({ id: "地方国公立・2次標準", label: "地方国公立・2次標準", date: getStepDateStr(0.7) });
                routes.push({ id: "旧帝大・難関国公立", label: "旧帝大・難関国公立（★ゴール）", date: getStepDateStr(1.0) });
            } else { routes.push({ id: "地方国公立・2次標準", label: "地方国公立・2次標準（★ゴール）", date: getStepDateStr(1.0) }); }
        } else {
            routes.push({ id: "日大・産近甲龍", label: "日大・産近甲龍レベル", date: getStepDateStr(0.35) });
            if (isTopTier) {
                routes.push({ id: "MARCH・関関同立", label: "MARCH・関関同立レベル", date: getStepDateStr(0.7) });
                routes.push({ id: "早慶・最難関私大", label: "早慶・最難関私大（★ゴール）", date: getStepDateStr(1.0) });
            } else if (isMidTier || schoolInput === "") {
                routes.push({ id: "MARCH・関関同立", label: "MARCH・関関同立（★ゴール）", date: getStepDateStr(1.0) });
            } else {
                routes.push({ id: "MARCH・関関同立", label: "志望校突破ルート（★ゴール）", date: getStepDateStr(1.0) });
            }
        }

        container.innerHTML = '';
        routes.forEach(route => {
            const savedData = userData.mypage.savedScores[route.id] || { actualDate: "", score: "" };
            container.insertAdjacentHTML('beforeend', `
                <tr class="dynamic-plan-row" data-id="${route.id}">
                    <td style="font-weight:700;">${route.label}</td>
                    <td><input type="date" value="${route.date}" disabled style="border:none; background:transparent; font-weight:bold; color:var(--accent-blue);"></td>
                    <td><input type="date" value="${savedData.actualDate}" onchange="saveMilestoneInputs()"></td>
                    <td><input type="number" class="dynamic-test-score" value="${savedData.score}" placeholder="%" oninput="saveMilestoneInputs()"></td>
                </tr>`);
        });
        calcAverageScore();
    }

    function displayFriendsList() { document.getElementById('friends-list-display').innerText = userData.friends.length > 0 ? `接続中: ${userData.friends.join(", ")}` : "接続中の友達はいません。"; }
    function renderAllViews() { renderBooksList(); renderTimelineList(); loadInputsFromUserData(); generateDynamicMilestones(); displayFriendsList(); }
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); element.classList.add('active');
        if(tabId === 'view-report') updateReportView();
        if(tabId === 'view-timeline') renderTimelineList();
    }
    function switchTimelineTab(tab, element) { currentTimelineTab = tab; document.querySelectorAll('#view-timeline .sub-nav-item').forEach(nav => nav.classList.remove('active')); element.classList.add('active'); renderTimelineList(); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function switchReportTab(period, element) { currentReportTab = period; document.querySelectorAll('#view-report .sub-nav-item').forEach(nav => nav.classList.remove('active')); element.classList.add('active'); updateReportView(); }
    
    function updateReportView() {
        const rangeText = document.getElementById('range-text');
        if (currentReportTab === 'day') { rangeText.innerText = "2026年06月18日"; renderDynamicChart(['今日'], [getTotalTime()], 'h'); } 
        else if (currentReportTab === 'week') { rangeText.innerText = "2026年06月15日〜2026年06月21日"; renderDynamicChart(['今週'], [getTotalTime()], 'h'); } 
        else { rangeText.innerText = "2026年06月01日〜2026年06月30日"; renderDynamicChart(['今月'], [getTotalTime()], 'h'); }
        calculateGrowthPlan();
    }
    function getTotalTime() { let t = 0; userData.records.forEach(r => t += r.time); return t > 0 ? (t / 60).toFixed(1) : 0; }
    function calculateGrowthPlan() {
        let rec = 0; userData.records.forEach(r => rec += r.time); let h = rec / 60;
        document.getElementById('growth-target-hours').innerText = `${(h * 1.1).toFixed(1)} 時間`;
        document.getElementById('growth-target-diff').innerText = `( +${(h * 0.1).toFixed(1)}h / +10% )`;
    }

    function renderTimelineList() {
        const container = document.getElementById('timeline-list');
        if (currentTimelineTab === 'me') { buildTimelineHtml(userData.records, userData.books, container); } else {
            if (userData.friends.length === 0) { container.innerHTML = '<div class="empty-state">友達のIDを登録しろ。</div>'; return; }
            db.collection("users").where("cloudId", "in", userData.friends).get().then(snap => {
                let rcs = []; let bks = [];
                snap.forEach(doc => { const d = doc.data(); if(d.records) { d.records.forEach(r => { r.friendName = d.cloudId; rcs.push(r); }); } if(d.books) bks = bks.concat(d.books); });
                buildTimelineHtml(rcs, bks, container);
            }).catch(() => { container.innerHTML = '<div class="empty-state">データ取得を待機中。</div>'; });
        }
    }
    function buildTimelineHtml(records, books, container) {
        container.innerHTML = ''; if(!records || records.length === 0) { container.innerHTML = '<div class="empty-state">記録なし</div>'; return; }
        [...records].sort((a,b) => b.timestamp - a.timestamp).forEach(r => {
            const b = books.find(bk => bk.id === r.bookId); const title = b ? b.title : "（教材）";
            const img = (b && b.img) ? `<img src="${b.img}">` : `<span>No Img</span>`;
            const tag = r.friendName ? `<div style="font-size:0.7rem; color:var(--accent-blue); font-weight:bold;">🔥 ${r.friendName}</div>` : '';
            container.insertAdjacentHTML('beforeend', `<div class="card">${tag}<div class="card-row"><div class="book-cover">${img}</div><div class="card-content"><div class="card-title">${title}</div><div><strong>${r.time}分</strong></div></div></div></div>`);
        });
    }

    function renderBooksList() {
        const container = document.getElementById('book-list'); container.innerHTML = '';
        if(userData.books.length === 0) { container.innerHTML = `<div class="empty-state">登録された教材がありません。</div>`; return; }
        userData.books.forEach(b => {
            const img = b.img ? `<img src="${b.img}">` : `<span>No Img</span>`;
            container.insertAdjacentHTML('beforeend', `<div class="card" onclick="openRecordModal('${b.id}', '${b.title}')" style="cursor: pointer;"><div class="card-row"><div class="book-cover">${img}</div><div class="card-content"><div class="card-title">${b.title}</div></div></div></div>`);
        });
    }
    function openRecordModal(id, title) { document.getElementById('record-book-title').innerText = title; document.getElementById('record-book-id').value = id; openModal('record-modal'); }
    function registerBook() {
        const title = document.getElementById('new-book-title').value.trim(); if(!title) return;
        userData.books.push({ id: 'book_' + Date.now(), title: title, pages: parseInt(document.getElementById('new-book-pages').value)||0, img: currentImageSrc });
        saveToLocalStorage(); syncWithCloud(); renderBooksList(); closeModalAndStopScanner();
    }
    function deleteBook() { const id = document.getElementById('record-book-id').value; userData.books = userData.books.filter(b => b.id !== id); saveToLocalStorage(); syncWithCloud(); renderAllViews(); closeModal('record-modal'); }
    function submitRecord() {
        const id = document.getElementById('record-book-id').value; const t = parseInt(document.getElementById('record-time').value); if(isNaN(t) || t <= 0) return;
        userData.records.push({ bookId: id, time: t, comment: document.getElementById('record-comment').value.trim(), timestamp: Date.now() });
        saveToLocalStorage(); syncWithCloud(); closeModal('record-modal'); switchTab('view-timeline', document.querySelectorAll('.nav-item'));
    }
    function saveMilestoneInputs() { document.querySelectorAll('.dynamic-plan-row').forEach(row => { const id = row.getAttribute('data-id'); const inputs = row.querySelectorAll('input'); userData.mypage.savedScores[id] = { actualDate: inputs.value, score: inputs.value }; }); saveToLocalStorage(); calcAverageScore(); }
    function saveDailyTargetInput() { userData.targets.day = document.getElementById('t-day').value; saveToLocalStorage(); }
    function saveWeeklyTargetInputs() { ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].forEach(day => { userData.targets.week[day] = document.getElementById(`t-${day}`).value; }); saveToLocalStorage(); calculateGrowthPlan(); }
    function saveMyPageInputs() { userData.mypage.date = document.getElementById('target-date').value; saveToLocalStorage(); calcCountdown(); generateDynamicMilestones(); }
    function loadInputsFromUserData() { if(userData.targets.day) document.getElementById('t-day').value = userData.targets.day; ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'].forEach(day => { if(userData.targets.week[day]) document.getElementById(`t-${day}`).value = userData.targets.week[day]; }); if(userData.mypage.school) document.getElementById('target-school').value = userData.mypage.school; if(userData.mypage.date) document.getElementById('target-date').value = userData.mypage.date; calcCountdown(); }
    function calcCountdown() { const s = document.getElementById('target-date').value; if(!s) return; document.getElementById('cd-days').innerText = Math.ceil((new Date(s).setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24)); }
    function calcAverageScore() { const inputs = document.querySelectorAll('.dynamic-test-score'); let total = 0; let count = 0; inputs.forEach(input => { const val = parseFloat(input.value); if(!isNaN(val)) { total += val; count++; } }); document.getElementById('avg-score-display').innerText = count > 0 ? `平均: ${Math.floor(total / count)}%` : `平均: --%`; }
    function renderDynamicChart(l, d, u) { const ctx = document.getElementById('barChart'); if (chartInstance) chartInstance.destroy(); chartInstance = new Chart(ctx, { type: 'bar', data: { labels: l, datasets: [{ data: d, backgroundColor: '#ff3b30', borderRadius: 3, barPercentage: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); }

    window.onload = () => { initializeStorage(); };
</script>
</body>
</html>
